services:
  - type: web
    name: auth-service
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-saude-db
          property: connectionString
      - key: DB_URL
        fromDatabase:
          name: smart-saude-db
          property: connectionString
      - key: BASE_URL
        value: https://esc-maya-yoshiko-yamamoto.onrender.com
    staticPublishPath: storage
    staticPublishDir: .
